<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <script>
    (function () {
      var isApple = /iPhone|iPad|iPod|Macintosh/.test(navigator.userAgent);
      if (isApple) {
        document.documentElement.classList.add("apple-device");

        // Force Cache Update on Apple Devices gracefully
        var appVersion = "1.0.1"; // Increment to force cache bust
        try {
          var storedVersion = localStorage.getItem("rudraksh_cache_version");
          if (storedVersion !== appVersion) {
            localStorage.setItem("rudraksh_cache_version", appVersion);
            if (window.location.search.indexOf("nocache=") === -1) {
              var separator = window.location.href.indexOf("?") === -1 ? "?" : "&";
              window.location.replace(window.location.href + separator + "nocache=" + new Date().getTime());
            }
          }
        } catch (e) {
          console.warn("localStorage not available or blocked in Private Mode", e);
        }
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- NOTE: Route-specific SEO (title/description/canonical/OG/Twitter) is injected per-page via react-helmet-async.

  <!-- SPA Fallback SEO -->

  <link rel="canonical" href="https://rudrakshsafar.com/" />
